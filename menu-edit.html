<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>BlingOrder | 菜單管理 (完整修復版)</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary-pink: #ff85a2; }
        body { font-family: sans-serif; background: #fff5f7; padding: 20px; }
        .edit-panel { background: white; padding: 25px; border-radius: 15px; border: 2px solid var(--primary-pink); max-width: 700px; margin: 0 auto 30px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .sold-out-box { background: #fff0f3; padding: 12px; border-radius: 8px; margin: 10px 0; border: 1px solid #ffccd5; display: flex; align-items: center; gap: 8px; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary-pink); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; }
       
        table { width: 100%; background: white; border-collapse: collapse; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
       
        .action-btns { display: flex; gap: 8px; }
        .btn-action { padding: 6px 12px; border-radius: 6px; cursor: pointer; border: 1px solid #ddd; font-weight: bold; font-size: 13px; }
        .btn-edit { background: #e3f2fd; color: #1976d2; }
        .btn-del { background: #fff0f0; color: #d32f2f; }
        .status-tag { padding: 4px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
<div class="edit-panel">
    <h3>✨ 菜單內容管理</h3>
    <input type="hidden" id="edit-id">
    <input type="text" id="category" placeholder="分類 (例如：甜點)">
    <input type="text" id="name" placeholder="餐點名稱">
    <input type="number" id="price" placeholder="價格">
    <input type="text" id="image-path" placeholder="圖片路徑 (images/檔名.jpg)">
    <input type="text" id="staff-note" placeholder="工作人員警語">
    <div class="sold-out-box">
        <input type="checkbox" id="is-sold-out" style="width:18px; height:18px;">
        <label for="is-sold-out" style="color:#d32f2f; font-weight:bold; cursor:pointer;">🔴 設定為「今日已售完」 (勾選後前端按鈕將變灰)</label>
    </div>
    <div style="margin: 15px 0;">
        <label><input type="checkbox" class="addon" value="冰"> 冰</label>
        <label><input type="checkbox" class="addon" value="去冰"> 去冰</label>
        <label><input type="checkbox" class="addon" value="熱"> 熱</label>
        <label><input type="checkbox" class="addon" value="無糖"> 無糖</label>
        <label><input type="checkbox" class="addon" value="加糖"> 加糖</label>
    </div>
    <!-- 五辛素 / 蛋奶素 -->
    <div style="margin: 15px 0;">
        <label><input type="checkbox" class="addon" value="五辛素"> 五辛素</label>
        <label><input type="checkbox" class="addon" value="蛋奶素"> 蛋奶素</label>
    </div>
    <!-- 餐點介紹 -->
    <div style="margin: 15px 0;">
        <label>餐點介紹：</label><br>
        <textarea id="description" rows="4" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:16px;" placeholder="請填寫口味、甜度建議、成分說明、熱量等資訊..."></textarea>
    </div>
    <button class="btn-save" onclick="saveItem()">儲存並發布 ✨</button>
</div>
<table>
    <thead>
        <tr><th>分類</th><th>圖片</th><th>名稱/價格</th><th>當前狀態</th><th>操作</th></tr>
    </thead>
    <tbody id="menu-tbody"></tbody>
</table>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCZDLj-2nQlj34yE8mXlynhYczMfsVqWxE",
        authDomain: "b-test-54722.firebaseapp.com",
        projectId: "b-test-54722",
        databaseURL: "https://b-test-54722-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "b-test-54722.firebasestorage.app",
        messagingSenderId: "224486979893",
        appId: "1:224486979893:web:9527007e7bcf128e5ab47c",
        measurementId: "G-5LY63TENT4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function saveItem() {
        const id = document.getElementById('edit-id').value || Date.now().toString();
        const addons = [];
        document.querySelectorAll('.addon:checked').forEach(cb => addons.push(cb.value));

        const data = {
            category: document.getElementById('category').value || "未分類",
            name: document.getElementById('name').value,
            price: document.getElementById('price').value,
            image: document.getElementById('image-path').value,
            staffNote: document.getElementById('staff-note').value || "",
            description: document.getElementById('description').value || "",
            addons: addons,
            isSoldOut: document.getElementById('is-sold-out').checked
        };

        if(!data.name || !data.price) return alert("名稱與價格為必填！");

        db.ref('menu/' + id).set(data).then(() => {
            alert("已儲存！");
            location.reload();
        }).catch(err => alert("儲存失敗：" + err.message));
    }

    db.ref('menu').on('value', snap => {
        const tbody = document.getElementById('menu-tbody');
        tbody.innerHTML = "";
        snap.forEach(child => {
            const i = child.val();
            const statusColor = i.isSoldOut ? 'background:#ffebee; color:#d32f2f;' : 'background:#e8f5e9; color:#2e7d32;';
            const statusText = i.isSoldOut ? '已售完' : '供餐中';
           
            tbody.innerHTML += `
                <tr>
                    <td>${i.category}</td>
                    <td><img src="${i.image}" width="50" style="border-radius:5px;"></td>
                    <td><b>${i.name}</b><br><small>$${i.price}</small></td>
                    <td><span class="status-tag" style="${statusColor}">${statusText}</span></td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-action btn-edit" onclick="startEdit('${child.key}')">修改</button>
                            <button class="btn-action btn-del" onclick="deleteItem('${child.key}')">刪除</button>
                        </div>
                    </td>
                </tr>`;
        });
    });

    function startEdit(id) {
        db.ref('menu/' + id).once('value', snap => {
            const i = snap.val();
            document.getElementById('edit-id').value = id;
            document.getElementById('category').value = i.category || '';
            document.getElementById('name').value = i.name || '';
            document.getElementById('price').value = i.price || '';
            document.getElementById('image-path').value = i.image || '';
            document.getElementById('staff-note').value = i.staffNote || '';
            document.getElementById('description').value = i.description || '';
            document.getElementById('is-sold-out').checked = i.isSoldOut || false;
           
            document.querySelectorAll('.addon').forEach(cb => {
                cb.checked = (i.addons || []).includes(cb.value);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    function deleteItem(id) {
        if(confirm("⚠️ 確定要徹底刪除這項餐點嗎？\n刪除後無法復原，請確認！")) {
            db.ref('menu/' + id).remove().then(() => alert("已從菜單中移除。"));
        }
    }
</script>
</body>
</html>
